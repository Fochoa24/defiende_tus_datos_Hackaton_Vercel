<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Defensor de Datos</title>
<style>
  :root {
    --bg: #f7f7f8;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #0f172a;
    --muted: #64748b;
    --header: #0f172a;
    --intake: #6366f1;
    --canal: #0ea5e9;
    --entrevista: #f59e0b;
    --revisando: #8b5cf6;
    --entrega: #10b981;
    --error: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 400px;
    height: 600px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
  }
  body { display: flex; flex-direction: column; }

  /* Header */
  header {
    background: var(--header);
    color: white;
    padding: 12px 16px 14px;
    flex-shrink: 0;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .title-block { display: flex; align-items: center; gap: 8px; }
  .icon {
    width: 28px; height: 28px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    margin-left: 36px;
    margin-top: 2px;
  }

  /* Phase badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .badge.intake     { background: rgba(99,102,241,0.18);  color: #c7d2fe; }
  .badge.intake .dot{ background: var(--intake); }
  .badge.canal      { background: rgba(14,165,233,0.18);  color: #bae6fd; }
  .badge.canal .dot { background: var(--canal); }
  .badge.entrevista { background: rgba(245,158,11,0.18);  color: #fde68a; }
  .badge.entrevista .dot { background: var(--entrevista); }
  .badge.revisando  { background: rgba(139,92,246,0.18);  color: #ddd6fe; }
  .badge.revisando .dot { background: var(--revisando); animation: pulse 1.2s ease-in-out infinite; }
  .badge.entrega    { background: rgba(16,185,129,0.18);  color: #a7f3d0; }
  .badge.entrega .dot { background: var(--entrega); }
  .badge.error      { background: rgba(239,68,68,0.18);  color: #fecaca; }
  .badge.error .dot { background: var(--error); }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(1.4); }
  }

  /* Progress bar */
  .progress {
    margin-top: 14px;
    display: flex;
    gap: 4px;
  }
  .step {
    flex: 1;
    height: 3px;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 2px;
    transition: background 0.3s;
  }
  .step.active { background: var(--accent); }

  /* Chat area */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 14px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 90%;
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--header);
    color: white;
    padding: 8px 12px;
    border-radius: 14px 14px 2px 14px;
    font-size: 13px;
  }
  .msg.agent {
    display: flex;
    gap: 8px;
    align-self: flex-start;
  }
  .msg.agent .avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--header);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
  }
  .msg.agent .bubble {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 14px 14px 14px 2px;
    font-size: 13px;
  }
  .typing {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.15s; }
  .typing .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%           { transform: translateY(-4px); opacity: 1; }
  }
  .system-marker {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 0;
  }
  .claim-box {
    margin-top: 8px;
    padding: 10px 12px;
    background: #f0fdf4;
    border-left: 3px solid var(--entrega);
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    line-height: 1.5;
    white-space: pre-wrap;
    max-height: 220px;
    overflow-y: auto;
  }
  .summary-card {
    margin-top: 8px;
    padding: 8px 10px;
    background: #f8fafc;
    border-left: 3px solid var(--accent);
    border-radius: 3px;
    font-size: 12px;
  }
  .summary-card .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .summary-card .row {
    display: flex;
    gap: 6px;
    margin-bottom: 2px;
  }
  .summary-card .row .k { color: var(--muted); min-width: 80px; }
  .summary-card .row .v { color: var(--text); font-weight: 500; }

  /* Footer / input area */
  footer {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--card);
    padding: 10px 12px 12px;
  }
  .copy-btn, .reset-btn, .send-btn {
    cursor: pointer;
    border: none;
    font-family: inherit;
    font-weight: 600;
  }
  .copy-btn {
    width: 100%;
    padding: 9px 12px;
    border-radius: 8px;
    background: var(--entrega);
    color: white;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .copy-btn:hover { opacity: 0.93; }
  .copy-btn.copied { background: #059669; }
  .input-row {
    display: flex;
    gap: 6px;
    align-items: stretch;
  }
  textarea {
    flex: 1;
    min-height: 40px;
    max-height: 100px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #f8fafc;
    resize: none;
    outline: none;
    transition: background 0.15s, border-color 0.15s;
  }
  textarea:focus { background: white; border-color: var(--accent); }
  textarea:disabled { opacity: 0.6; cursor: not-allowed; }
  .send-btn {
    width: 40px;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-size: 16px;
  }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .footer-hint {
    text-align: center;
    color: var(--muted);
    font-size: 10px;
    margin-top: 8px;
  }
  .reset-btn {
    background: none;
    color: var(--muted);
    text-decoration: underline;
    font-size: 10px;
    padding: 0;
  }
  .reset-btn:hover { color: var(--text); }
</style>
</head>
<body>
  <header>
    <div class="header-row">
      <div class="title-block">
        <div class="icon">🛡️</div>
        <h1>Defensor de Datos</h1>
      </div>
      <span id="badge" class="badge intake">
        <span class="dot"></span><span id="badge-label">Problema</span>
      </span>
    </div>
    <div class="subtitle">Ley 21.719 · Protección de datos</div>
    <div class="progress" id="progress"></div>
  </header>

  <main id="chat"></main>

  <footer>
    <button id="copy-btn" class="copy-btn" style="display:none">📋 Copiar Reclamo</button>
    <div class="input-row">
      <textarea id="input" placeholder="Escribe aquí..." rows="1"></textarea>
      <button id="send-btn" class="send-btn" title="Enviar">➤</button>
    </div>
    <div class="footer-hint">
      <button id="reset-btn" class="reset-btn">Empezar de nuevo</button>
    </div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
